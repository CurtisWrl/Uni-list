<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志願校系總覽</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d2e; --card2: #222538;
    --accent: #6c63ff; --accent2: #48cae4;
    --green: #06d6a0; --yellow: #ffd166; --red: #ef476f;
    --text: #e8eaf6; --muted: #8b8fa8; --border: #2e3150;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* STICKY CONDITION BAR */
  .condition-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,.96); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  }
  .condition-bar .cb-label { font-size: .75rem; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-right: 2px; }
  .badge { border-radius: 20px; padding: 4px 12px; font-size: .78rem; font-weight: 600; border: 1.5px solid; }
  .badge.top { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.1); }
  .badge.avg { border-color: var(--accent2); color: var(--accent2); background: rgba(72,202,228,.08); }
  .badge.neu { border-color: var(--border); color: var(--muted); background: var(--card2); }
  .badge.no  { border-color: var(--red); color: var(--red); background: rgba(239,71,111,.08); }

  /* PAGES */
  .page { display: none; flex: 1; }
  .page.active { display: block; }

  /* HOME */
  #home { padding: 32px 24px 60px; }
  .home-header { text-align: center; margin-bottom: 28px; }
  .home-header h1 { font-size: 1.9rem; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
  .home-header p { color: var(--muted); font-size: .9rem; }

  .uni-grid { max-width: 860px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 580px) { .uni-grid { grid-template-columns: 1fr; } }

  .uni-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 22px 24px; cursor: pointer; transition: transform .18s, box-shadow .18s, border-color .18s; display: flex; flex-direction: column; gap: 10px; }
  .uni-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(108,99,255,.22); border-color: var(--accent); }
  .uni-card-top { display: flex; align-items: center; gap: 12px; }
  .uni-tag { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: .75rem; font-weight: 800; padding: 5px 12px; border-radius: 10px; letter-spacing: .06em; flex-shrink: 0; }
  .uni-name { font-size: .97rem; font-weight: 700; line-height: 1.3; }
  .uni-meta { display: flex; align-items: center; justify-content: space-between; }
  .dept-count { font-size: .78rem; color: var(--muted); background: var(--card2); padding: 4px 12px; border-radius: 20px; }
  .arrow-btn { font-size: 1.1rem; color: var(--accent); }
  .rank-preview { display: flex; flex-wrap: wrap; gap: 5px; }
  .rp { font-size: .7rem; padding: 2px 8px; border-radius: 8px; border: 1px solid; }
  .rp.g { border-color: rgba(6,214,160,.35); color: var(--green); background: rgba(6,214,160,.08); }
  .rp.y { border-color: rgba(255,209,102,.3); color: var(--yellow); background: rgba(255,209,102,.07); }
  .rp.m { border-color: var(--border); color: var(--muted); }

  /* DETAIL */
  #detail { padding-bottom: 60px; }
  .detail-topbar { background: rgba(15,17,23,.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 14px; }
  .back-btn { background: var(--card2); border: 1.5px solid var(--border); color: var(--text); font-size: .88rem; font-weight: 600; padding: 7px 16px; border-radius: 10px; cursor: pointer; transition: background .15s; }
  .back-btn:hover { background: var(--border); }
  .detail-uni-tag { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: .78rem; font-weight: 800; padding: 5px 14px; border-radius: 10px; letter-spacing: .06em; }
  .detail-uni-name { font-size: 1.05rem; font-weight: 700; }

  .detail-body { max-width: 860px; margin: 0 auto; padding: 24px 24px 0; display: flex; flex-direction: column; gap: 18px; }

  .dept-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; overflow: hidden; }
  .dept-card-header { background: var(--card2); padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .dept-card-name { font-size: 1.1rem; font-weight: 800; line-height: 1.4; }
  .dept-card-sub { font-size: .83rem; color: var(--accent2); margin-top: 3px; font-weight: 600; }
  .rank-group { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .rank-big { font-size: .88rem; font-weight: 700; padding: 6px 16px; border-radius: 12px; white-space: nowrap; }
  .rank-big.g { background: rgba(6,214,160,.15); color: var(--green); border: 1.5px solid rgba(6,214,160,.35); }
  .rank-big.y { background: rgba(255,209,102,.1); color: var(--yellow); border: 1.5px solid rgba(255,209,102,.28); }
  .rank-big.n { background: var(--card2); color: var(--muted); border: 1.5px solid var(--border); font-size: .78rem; }

  .dept-card-body { padding: 16px 22px; display: flex; flex-direction: column; gap: 14px; }
  .info-label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
  .grade-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .gtag { font-size: .8rem; font-weight: 600; padding: 4px 12px; border-radius: 10px; border: 1.5px solid; }
  .gtag.hi  { border-color: rgba(108,99,255,.5); color: var(--accent); background: rgba(108,99,255,.1); }
  .gtag.mid { border-color: rgba(72,202,228,.4); color: var(--accent2); background: rgba(72,202,228,.08); }
  .gtag.lo  { border-color: var(--border); color: var(--muted); background: var(--card2); }
  .seq-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .seq-item { display: flex; align-items: center; gap: 4px; }
  .seq-num { width: 20px; height: 20px; background: var(--accent); color: #fff; border-radius: 50%; font-size: .66rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .seq-text { font-size: .8rem; color: var(--text); background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 3px 10px; }
  .note-box { background: rgba(255,209,102,.06); border: 1px solid rgba(255,209,102,.2); border-radius: 10px; padding: 8px 14px; font-size: .8rem; color: var(--yellow); }
  hr.div { border: none; border-top: 1px solid var(--border); }
</style>
</head>

      { name:"傳播學系", sub:"", grades:[["國「均」","mid"],["英「均」","mid"],["社「均」","mid"]], seq:["在校學業","學測國文","學測英文","學測社會","國文學業","英文學業","公民學業"], r1:"7%", r2:"", note:"" },
      { name:"外國語文學系", sub:"", grades:[["國「均」","mid"],["英「前」","hi"],["社「均」","mid"]], seq:["在校學業","學測英文","學測國文","學測社會","學測國+英+社","英文學業","國文學業"], r1:"7%", r2:"", note:"" },
    ]
  },
];

function rc(v) {
  if (!v || v==="—") return "n";
  return parseInt(v) <= 5 ? "g" : "y";
}

// Build home
const grid = document.getElementById("uniGrid");
data.forEach((uni, idx) => {
  const pills = uni.depts.slice(0,4).map(d => {
    if (!d.r1||d.r1==="—") return `<span class="rp m">—</span>`;
    const cls = parseInt(d.r1)<=5?"g":"y";
    const nm = d.name.length>6 ? d.name.slice(0,5)+"…" : d.name;
    return `<span class="rp ${cls}">${nm} ${d.r1}</span>`;
  }).join("");
  const el = document.createElement("div");
  el.className = "uni-card";
  el.innerHTML = `
    <div class="uni-card-top">
      <span class="uni-tag">${uni.tag}</span>
      <span class="uni-name">${uni.name}</span>
    </div>
    <div class="rank-preview">${pills}</div>
    <div class="uni-meta">
      <span class="dept-count">${uni.depts.length} 個系所</span>
      <span class="arrow-btn">→</span>
    </div>`;
  el.addEventListener("click", () => openDetail(idx));
  grid.appendChild(el);
});

function openDetail(idx) {
  const uni = data[idx];
  document.getElementById("detailTag").textContent = uni.tag;
  document.getElementById("detailName").textContent = uni.name;
  document.getElementById("detailBody").innerHTML = uni.depts.map(d => {
    const grades = d.grades.map(([g,c])=>`<span class="gtag ${c}">${g}</span>`).join("");
    const seq = d.seq.map((s,i)=>`<div class="seq-item"><span class="seq-num">${i+1}</span><span class="seq-text">${s}</span></div>`).join("");
    const r2 = d.r2 ? `<span class="rank-big ${rc(d.r2)}">🥈 第2輪 ${d.r2}</span>` : "";
    const note = d.note ? `<div class="note-box">⚠️ ${d.note}</div>` : "";
    return `
      <div class="dept-card">
        <div class="dept-card-header">
          <div>
            <div class="dept-card-name">${d.name}</div>
            ${d.sub?`<div class="dept-card-sub">▸ ${d.sub}</div>`:""}
          </div>
          <div class="rank-group">
            <span class="rank-big ${rc(d.r1)}">🥇 第1輪 ${d.r1||"—"}</span>
            ${r2}
          </div>
        </div>
        <div class="dept-card-body">
          <div><div class="info-label">115 檢定成績</div><div class="grade-tags">${grades}</div></div>
          <hr class="div">
          <div><div class="info-label">分發比序（依序）</div><div class="seq-list">${seq}</div></div>
          ${note}
        </div>
      </div>`;
  }).join("");
  document.getElementById("home").classList.remove("active");
  document.getElementById("detail").classList.add("active");
  window.scrollTo(0,0);
}

function goHome() {
  document.getElementById("detail").classList.remove("active");
  document.getElementById("home").classList.add("active");
  window.scrollTo(0,0);
}
</script>
</body>
</html>
