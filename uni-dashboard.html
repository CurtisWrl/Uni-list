<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>志願校系總覽</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card2: #222538;
    --accent: #6c63ff;
    --accent2: #48cae4;
    --green: #06d6a0;
    --yellow: #ffd166;
    --red: #ef476f;
    --text: #e8eaf6;
    --muted: #8b8fa8;
    --border: #2e3150;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 24px 16px; }

  h1 { text-align: center; font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
  .profile-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; max-width: 860px; margin: 0 auto 28px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .profile-bar span { font-size: .78rem; color: var(--muted); }
  .badge { background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: .76rem; color: var(--text); }
  .badge.top { border-color: var(--accent); color: var(--accent); }
  .badge.avg { border-color: var(--accent2); color: var(--accent2); }

  .grid { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

  .uni-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: box-shadow .2s; }
  .uni-card:hover { box-shadow: 0 4px 24px rgba(108,99,255,.18); }

  .uni-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; user-select: none; }
  .uni-left { display: flex; align-items: center; gap: 12px; }
  .uni-tag { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: .72rem; font-weight: 700; padding: 4px 10px; border-radius: 8px; letter-spacing: .05em; }
  .uni-name { font-size: 1rem; font-weight: 700; }
  .uni-count { background: var(--card2); color: var(--muted); font-size: .75rem; padding: 3px 10px; border-radius: 20px; }
  .chevron { color: var(--muted); font-size: 1rem; transition: transform .3s; }
  .uni-card.open .chevron { transform: rotate(180deg); }

  .dept-list { display: none; border-top: 1px solid var(--border); }
  .uni-card.open .dept-list { display: block; }

  .dept-item { padding: 14px 20px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 8px 16px; align-items: start; transition: background .15s; }
  .dept-item:last-child { border-bottom: none; }
  .dept-item:hover { background: rgba(108,99,255,.05); }

  .dept-name { font-size: .92rem; font-weight: 600; line-height: 1.4; }
  .dept-sub { font-size: .78rem; color: var(--accent2); margin-top: 2px; }

  .right-col { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 90px; }

  .rank-pill { font-size: .82rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .rank-1 { background: rgba(6,214,160,.15); color: var(--green); border: 1px solid rgba(6,214,160,.3); }
  .rank-2 { background: rgba(255,209,102,.1); color: var(--yellow); border: 1px solid rgba(255,209,102,.25); }
  .rank-none { background: var(--card2); color: var(--muted); border: 1px solid var(--border); font-size:.74rem; }

  .tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag { font-size: .7rem; padding: 2px 7px; border-radius: 6px; border: 1px solid var(--border); color: var(--muted); }
  .tag.hi { border-color: rgba(108,99,255,.4); color: var(--accent); background: rgba(108,99,255,.08); }

  .seq-row { margin-top: 6px; font-size: .74rem; color: var(--muted); line-height: 1.5; }
  .seq-row b { color: var(--text); font-weight: 600; }

  @media(max-width:520px) {
    .dept-item { grid-template-columns: 1fr; }
    .right-col { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  }
</style>
</head>

    depts:[

      { name:"政治學系", sub:"※數B符合", grades:"國「均」英「均」數A「均」數B「均」社「均」", seq:"在校學業、學測英文、學測國文、學測社會、學測國+英+社、英文學業、數學學業", r1:"18%", r2:"3%" },

      { name:"諮商與輔導學系", sub:"", grades:"國「均」英「均」數B「均」", seq:"在校學業、學測英文、學測國文、學測國+英+數B、英文學業、國文學業、公民學業", r1:"8%", r2:"" },

      { name:"幼兒教育學系", sub:"", grades:"國「均」英「後」社「後」", seq:"在校學業、學測國文、學測英文、學測社會、學測國+英+社、國文學業、英文學業", r1:"20%", r2:"" },
      { name:"文化與自然資源學系", sub:"", grades:"社「均」", seq:"在校學業、學測社會、學測英文、學測國文、歷史學業、地理學業、國文學業", r1:"22%", r2:"" },

function rankClass(v) {
  if (!v || v==="—") return "rank-none";
  const n = parseInt(v);
  if (n <= 5) return "rank-1";
  return "rank-2";
}

function gradeTag(g) {
  const parts = g.split(/[、，,\s]+/).filter(Boolean);
  return parts.map(p => {
    const hi = p.includes("前") || p.includes("頂") || p.includes("A");
    return `<span class="tag${hi?' hi':''}">${p}</span>`;
  }).join("");
}

const grid = document.getElementById("grid");

data.forEach(uni => {
  const card = document.createElement("div");
  card.className = "uni-card";

  card.innerHTML = `
    <div class="uni-header">
      <div class="uni-left">
        <span class="uni-tag">${uni.tag}</span>
        <span class="uni-name">${uni.name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="uni-count">${uni.depts.length} 個系所</span>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="dept-list">
      ${uni.depts.map(d => `
        <div class="dept-item">
          <div>
            <div class="dept-name">${d.name}${d.sub?` <span class="dept-sub">${d.sub}</span>`:""}</div>
            <div class="tags-row">${gradeTag(d.grades)}</div>
            <div class="seq-row"><b>比序：</b>${d.seq}</div>
          </div>
          <div class="right-col">
            <span class="rank-pill ${rankClass(d.r1)}">🥇 第1輪 ${d.r1||"—"}</span>
            ${d.r2 ? `<span class="rank-pill ${rankClass(d.r2)}">🥈 第2輪 ${d.r2}</span>` : ""}
          </div>
        </div>
      `).join("")}
    </div>
  `;

  card.querySelector(".uni-header").addEventListener("click", () => {
    card.classList.toggle("open");
  });

  grid.appendChild(card);
});
</script>
